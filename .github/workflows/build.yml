name: Build Map Data

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r pip-req.txt

      - name: Fetch map items
        run: python fetch_map_items.py

      - name: Parse map tiles
        run: python map_parse.py

      - name: Extract features (SIFT)
        run: python -m match_engine.common extract --dir output/trimmed --out output/assets --param-set siftgz_ct30_et10_ol2_s16_g150_mpc200_r75_ds1_ts7000_to512_bt5_em8_md40

      - name: Package artifacts
        run: |
          zip -r orig_map.zip orig_map
          cd output
          zip -r ../orig.zip orig
          zip -r ../trimmed.zip trimmed
          zip -r ../features.zip assets

      - name: Package assets bundle
        run: |
          cp -r assets/* output/assets
          cp map_items.db output/assets
          cp output/map_coords.json output/assets
          cd output && zip -r ../assets.zip assets

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Map Data Build #${{ github.run_number }}
          files: |
            map_items.db
            orig_map.zip
            orig.zip
            trimmed.zip
            features.zip
            assets.zip
