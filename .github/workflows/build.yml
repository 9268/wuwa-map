name: Build Map Data

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r pip-req.txt

      - name: Fetch map items
        run: python fetch_map_items.py

      - name: Parse map tiles
        run: python map_parse.py

      - name: Extract features (SIFT)
        run: python -m match_engine.common extract --dir output/trimmed --out output/assets --param-set siftgz_ct30_et10_ol2_s16_g150_mpc200_r75_ds1_ts7000_to512_bt5_em8_md40

      - name: Package artifacts
        run: |
          zip -r orig_map.zip orig_map
          cd output
          zip -r ../orig.zip orig
          zip -r ../trimmed.zip trimmed
          zip -r ../features.zip assets

      - name: Package assets bundle -> stitched
        run: |
          mkdir -p stitched
          cp -r assets/* stitched
          cp -r output/assets/* stitched
          cp map_items.db stitched
          cp output/map_coords.json stitched
          zip -r assets.zip stitched

      - name: Get current date
        id: date
        run: echo "date=$(date +%Y%m%d)" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ steps.date.outputs.date }}-${{ github.run_number }}
          name: Map Data Build ${{ steps.date.outputs.date }} #${{ github.run_number }}
          body: |
            地图提取所用参数：siftgz_ct30_et10_ol2_s16_g150_mpc200_r75_ds1_ts7000_to512_bt5_em8_md40
            请下载assets.zip，解压到 assets 目录
          files: |
            map_items.db
            orig_map.zip
            orig.zip
            trimmed.zip
            features.zip
            assets.zip
